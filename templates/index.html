<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Apple Prediction</title>

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<div class="overlay"></div>

<div class="card">

    <h1>🍎 Apple Prediction</h1>
    <p>أدخل معرف اللاعب للمتابعة</p>

    <form method="POST">

        <input
            type="text"
            name="player_id"
            placeholder="أدخل ID اللاعب"
            value="{{ player_id }}"
            required>

        <button type="submit">متابعة</button>

    </form>

    {% if prediction %}

    <div class="result">

        <h2>نتائج التوقع</h2>

        <div class="board">

            {% for row in prediction %}

            <div class="line">

                {% for col in range(1,6) %}

                    {% if col == row %}
                        <div class="cell apple">🍎</div>
                    {% else %}
                        <div class="cell mushroom">🍄</div>
                    {% endif %}

                {% endfor %}

            </div>

            {% endfor %}

        </div>

    </div>

    {% endif %}

</div>

</body>
</html>
